name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      - run: cargo build --workspace --all-targets --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable
      # E2E tests under `tests/` self-skip when Docker is unreachable, so
      # running --all-targets here is safe on a stock GitHub runner.
      - run: cargo test --workspace --all-targets --all-features

  # Verifies the crate builds on the declared MSRV (rust-version in Cargo.toml).
  # If you bump the MSRV, bump the toolchain version below in the same commit.
  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv
      - run: cargo build --workspace --all-targets --all-features

  # Aggregator job — make this one "required" in branch protection.
  # Succeeds only when every job in `needs` succeeded.
  ci:
    name: ci
    if: always()
    needs: [fmt, clippy, build, test, msrv]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" = "true" ]; then
            echo "One or more required jobs did not succeed:"
            echo "  fmt:    ${{ needs.fmt.result }}"
            echo "  clippy: ${{ needs.clippy.result }}"
            echo "  build:  ${{ needs.build.result }}"
            echo "  test:   ${{ needs.test.result }}"
            echo "  msrv:   ${{ needs.msrv.result }}"
            exit 1
          fi
          echo "All CI jobs succeeded."

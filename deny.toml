# cargo-deny configuration.
#
# Run locally with: `cargo deny check`
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Audit the full dependency graph for the default target plus the
# common Linux/macOS/Windows tier-1 targets so we catch advisories on
# platform-specific deps too.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Documented exceptions. Each entry has a reason; re-evaluate at every
# dependency bump.
ignore = [
    # Three advisories below are all pulled in transitively through `mongodb`
    # (dev-dependency only — used by the e2e tests in `tests/`, not by the
    # proxy itself). The vulnerable code paths run inside the driver during
    # DNS resolution / BSON timestamp parsing of trusted, test-controlled
    # input. Track upstream releases of `mongodb`; remove once the driver
    # pulls forward to hickory-proto >= 0.26.1 and time >= 0.3.47.
    { id = "RUSTSEC-2026-0118", reason = "Transitive via mongodb (dev-dep). NSEC3 DoS unreachable in test paths." },
    { id = "RUSTSEC-2026-0119", reason = "Transitive via mongodb (dev-dep). DNS encoding O(n^2) unreachable in test paths." },
    { id = "RUSTSEC-2026-0009", reason = "Transitive via mongodb -> bson (dev-dep). RFC 2822 DoS unreachable; no untrusted input." },
]

[licenses]
version = 2
# SPDX expressions of licenses allowed in the dependency graph. Anything
# outside this list fails the check and must be reviewed.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # webpki-roots bundles Mozilla's CA root list under CDLA-Permissive-2.0.
    # It's permissive (modeled on Apache-2.0) but rare enough that cargo-deny
    # doesn't include it in any default group.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path dependencies (e.g. `logger`) use { path = "..." } and would
# otherwise trip the wildcard ban.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
